<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPilot AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #111;
            border-right: 1px solid #262626;
            padding: 30px;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, #1a1a1a, #000);
            padding: 40px;
            position: relative;
        }

        .chat-header {
            margin-bottom: 30px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            align-self: flex-start;
        }

        .message.user {
            background: #fff;
            color: #000;
            align-self: flex-end;
            margin-left: auto;
        }

        .input-container {
            background: #111;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            background: transparent;
            border: none;
            color: #fff;
            flex: 1;
            padding: 10px;
            outline: none;
        }

        .send-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .menu-item {
            display: block;
            color: #d4d4d4;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .menu-item:hover, .menu-item.active {
            background: #1a1a1a;
            color: #fff;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        {% include 'layouts/sidebar.html' %}

        <main class="chat-main">
            <div class="chat-header">
                <h1 class="fw-bold fs-3 m-0">AI Intelligence Core</h1>
                <p class="text-secondary small">Ask anything about your business data.</p>
            </div>

            <div class="chat-messages d-flex flex-column" id="chatMessages">
                <div class="message ai">
                    Hello <strong>{{ session.get('user_name', 'User') }}</strong>! I am the ERPilot AI core. I can help you analyze inventory, check sales performance, or identify low-stock items. How can I help you today?
                </div>
            </div>

            <div class="input-container">
                <input type="text" id="userInput" class="chat-input" placeholder="Type your message here..." autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </main>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add User Message
            addMessage(message, 'user');
            userInput.value = '';

            // Loading state?
            
            try {
                const response = await fetch('/ai-assistant/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                addMessage(data.response, 'ai');
            } catch (error) {
                addMessage("I'm sorry, I encountered an error connecting to the intelligence core.", 'ai');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
