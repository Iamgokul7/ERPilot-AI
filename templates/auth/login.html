<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ERPilot AI Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#000000;
    color:white;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-wrapper{
    width:100%;
    max-width:450px;
    padding:20px;
}

.login-card{
    background:#111111;
    border:1px solid #262626;
    border-radius:28px;
    padding:45px;
    box-shadow:0 20px 60px rgba(255,255,255,0.03);
}

.logo{
    font-size:2rem;
    font-weight:800;
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#a3a3a3;
    margin-bottom:35px;
}

.form-control{
    background:#171717;
    border:1px solid #303030;
    color:white;
    height:55px;
}

.form-control:focus{
    background:#171717;
    color:white;
    border-color:#737373;
    box-shadow:none;
}

.form-label{
    color:#d4d4d4;
}

.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:14px;
    background:white;
    color:black;
    font-weight:600;
}

.login-btn:hover{
    background:#e5e5e5;
}

.bottom-text{
    text-align:center;
    margin-top:25px;
    color:#a3a3a3;
}

.bottom-text a{
    color:white;
    text-decoration:none;
}

.alert{
    border-radius:12px;
}

</style>

</head>

<body>

<div class="login-wrapper">

<div class="login-card">

<div class="logo">
ERPilot AI
</div>

<p class="subtitle">
Sign in to your enterprise workspace
</p>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-danger">
    {{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<div class="mb-3">
<label class="form-label">
Email Address
</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>
</div>

<div class="mb-4">
<label class="form-label">
Password
</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter your password"
required>
</div>

<button type="submit" class="login-btn">
Sign In
</button>

</form>

<div class="bottom-text">

Don't have an account?

<a href="/register">
Create Company Account
</a>

</div>

</div>

</div>

</body>

</html>
