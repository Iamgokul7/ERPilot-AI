<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Company Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    font-family:'Inter',sans-serif;
}

body{
    background:#000;
    color:white;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 0;
}

.register-wrapper{
    width:100%;
    max-width:700px;
}

.register-card{
    background:#111111;
    border:1px solid #262626;
    border-radius:30px;
    padding:45px;
}

.logo{
    text-align:center;
    font-size:2rem;
    font-weight:800;
}

.subtitle{
    text-align:center;
    color:#a3a3a3;
    margin-bottom:35px;
}

.form-control{
    background:#171717;
    border:1px solid #303030;
    color:white;
    height:55px;
}

.form-control:focus{
    background:#171717;
    color:white;
    border-color:#737373;
    box-shadow:none;
}

.form-label{
    color:#d4d4d4;
}

.create-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:14px;
    background:white;
    color:black;
    font-weight:600;
}

.create-btn:hover{
    background:#e5e5e5;
}

.bottom-link{
    text-align:center;
    margin-top:25px;
    color:#a3a3a3;
}

.bottom-link a{
    color:white;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="register-wrapper">

<div class="register-card">

<div class="logo">
ERPilot AI
</div>

<p class="subtitle">
Create your company workspace
</p>

<form method="POST">

<div class="mb-3">
<label class="form-label">Company Name</label>
<input
type="text"
name="company_name"
class="form-control"
placeholder="Enter company name"
required>
</div>

<div class="mb-3">
<label class="form-label">Company Email</label>
<input
type="email"
name="company_email"
class="form-control"
placeholder="company@example.com"
required>
</div>

<div class="mb-3">
<label class="form-label">Admin Name</label>
<input
type="text"
name="admin_name"
class="form-control"
placeholder="Admin full name"
required>
</div>

<div class="mb-3">
<label class="form-label">Admin Email</label>
<input
type="email"
name="admin_email"
class="form-control"
placeholder="admin@example.com"
required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input
type="password"
name="password"
class="form-control"
required>
</div>

<div class="mb-4">
<label class="form-label">Confirm Password</label>
<input
type="password"
name="confirm_password"
class="form-control"
required>
</div>

<button type="submit" class="create-btn">
Create Company Workspace
</button>

</form>

<div class="bottom-link">
Already have an account?
<a href="/login">Sign In</a>
</div>

</div>

</div>

</body>

</html>
