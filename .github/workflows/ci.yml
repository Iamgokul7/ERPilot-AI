name: ERPilot AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: erpilot_user
          POSTGRES_PASSWORD: erpilot_pass
          POSTGRES_DB: erpilot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Database Initialization
      run: |
        python database.py
      env:
        DATABASE_URL: postgresql://erpilot_user:erpilot_pass@localhost:5432/erpilot_db

    - name: Run Pytest Suite
      run: |
        pytest -v --cov=.
      env:
        DATABASE_URL: sqlite:///instance/test_erpilot.db
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Build Docker Image
      run: |
        docker build -t erpilot-ai:latest .
